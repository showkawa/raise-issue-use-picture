# tcc runtime configuration. All fields are optional and fall back to the
# defaults shown here. tcc talks to a running teams-copilot-proxy.

provider: "proxy"          # proxy | mock (mock is for tests only)

proxy:
  baseUrl: "http://127.0.0.1:8000/v1"
  model: "m365-copilot"
  apiKey: "unused"
  timeoutMs: 120000

# Copy to config.yaml only when you need to override the defaults below.
# tcc talks to a running teams-copilot-proxy over an OpenAI-compatible API.

provider: "proxy"          # proxy | mock  (mock is for tests only)

proxy:
  # OpenAI-compatible base URL of teams-copilot-proxy, including the /v1 suffix.
  baseUrl: "http://127.0.0.1:8000/v1"
  # Model routed through the proxy to Microsoft 365 Copilot.
  model: "m365-copilot"
  # The proxy ignores the key, but the OpenAI request shape requires one.
  apiKey: "unused"
  # Per-request timeout in milliseconds.
  timeoutMs: 120000
